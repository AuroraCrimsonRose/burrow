# Burrow coturn configuration
# Realm & auth
realm=${TURN_REALM}
use-auth-secret
static-auth-secret=${TURN_SECRET}

# Networking
listening-port=${TURN_PORT}
tls-listening-port=${TURN_TLS_PORT}
min-port=${TURN_MIN_PORT}
max-port=${TURN_MAX_PORT}

# Listen on all interfaces for control connections
listening-ip=0.0.0.0
# Bind relay ports on the private IP so coturn recognises same-server
# relay-to-relay traffic and delivers it internally (not via loopback).
relay-ip=${TURN_LOCAL_IP}

# Public IP for NAT traversal (resolved at startup from TURN_HOST)
external-ip=${TURN_EXTERNAL_IP}

# Logging
log-file=stdout
verbose

# Security
no-multicast-peers
no-cli
fingerprint

# Deny private/link-local relay to prevent SSRF
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=::1

# Allow self-relay (TURN-to-TURN on same server)
# Both the private relay IP and the public external-ip are needed because
# relay candidates advertise the public IP (via external-ip mapping), so
# CreatePermission requests reference the public IP as the peer address.
allowed-peer-ip=10.22.89.0-10.22.89.255
allowed-peer-ip=${TURN_EXTERNAL_IP_PUBLIC}
allowed-peer-ip=127.0.0.0-127.255.255.255

# Stale-nonce for short-lived credentials
stale-nonce=600
