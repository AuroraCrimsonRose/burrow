services:
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend-deps:/app/deps
      - backend-build:/app/_build
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      clamav:
        condition: service_healthy

  db:
    image: postgres:16
    env_file: .env
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-burrow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  coturn:
    build: ./coturn
    env_file: .env
    ports:
      - "${TURN_PORT:-3478}:${TURN_PORT:-3478}/tcp"
      - "${TURN_PORT:-3478}:${TURN_PORT:-3478}/udp"
      - "${TURN_TLS_PORT:-5349}:${TURN_TLS_PORT:-5349}/tcp"
      - "${TURN_TLS_PORT:-5349}:${TURN_TLS_PORT:-5349}/udp"
      - "${TURN_MIN_PORT:-49152}-${TURN_MAX_PORT:-49252}:${TURN_MIN_PORT:-49152}-${TURN_MAX_PORT:-49252}/udp"
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf.tpl:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "turnadmin -l -r ${TURN_REALM:-burrow.local} || true"]
      interval: 10s
      timeout: 5s
      retries: 3

  clamav:
    image: clamav/clamav:1.4
    ports:
      - "127.0.0.1:3310:3310"
    volumes:
      - clamav-data:/var/lib/clamav
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  db-data:
  redis-data:
  minio-data:
  backend-deps:
  backend-build:
  clamav-data:
