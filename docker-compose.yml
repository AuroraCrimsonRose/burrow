version: "3.9"

services:
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend-deps:/app/deps
      - backend-build:/app/_build
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  db-data:
  redis-data:
  backend-deps:
  backend-build:
